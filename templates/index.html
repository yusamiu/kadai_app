<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>夏休み課題管理アプリ</title>
        <style>
            body {
                background-color: #f4f7f6;
                font-family: 'Helvetica Neue', Arial, sans-serif;
                max-width: 950px;
                margin: 30px auto;
                padding: 0 20px;
                color: #333;
            }
            
            /* ヘッダー周りのデザイン */
            .header-area {
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 3px solid #e67e22;
                padding-bottom: 10px;
                margin-bottom: 20px;
            }
            h1 {
                color: #2c3e50;
                margin: 0;
                font-size: 24px;
            }
            .user-info {
                font-size: 14px;
            }
            .logout-btn {
                background-color: #7f8c8d;
                color: white;
                text-decoration: none;
                padding: 5px 10px;
                border-radius: 4px;
                font-size: 12px;
                margin-left: 10px;
            }
            .logout-btn:hover { background-color: #95a5a6; }

            .main-container {
                display: flex;
                gap: 20px;
            }

            .left-column {
                flex: 1.1;
                width: 100%;
            }

            .right-column {
                flex: 1.3;
                background: white;
                padding: 15px;
                border-radius: 8px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.05);
                height: fit-content;
                width: 100%;
                box-sizing: border-box;
            }

            .input-area {
                background: white;
                padding: 15px;
                border-radius: 8px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.05);
                margin-bottom: 20px;
            }

            h2 {
                font-size: 18px;
                margin-top: 0;
                color: #34495e;
            }

            input[type="text"], input[type="date"], select {
                padding: 8px;
                margin-bottom: 8px;
                border: 2px solid #bdc3c7;
                border-radius: 6px;
                font-size: 14px;
                box-sizing: border-box;
            }

            input[type="text"] { width: 100%; }
            input[type="date"] { width: 55%; }
            select { width: 40%; background-color: white; }

            .submit-btn {
                background-color: #e67e22;
                color: white;
                border: none;
                padding: 10px 15px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 14px;
                font-weight: bold;
                width: 100%;
            }
            .submit-btn:hover { background-color: #d35400; }

            ul { list-style: none; padding: 0; }

            li {
                background: white;
                padding: 12px;
                margin-bottom: 8px;
                border-radius: 6px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.05);
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 14px;
                gap: 10px;
            }

            .deadline-stamp {
                font-size: 12px;
                color: #7f8c8d;
                display: block;
                margin-top: 4px;
            }

            .alert-text {
                color: #e74c3c;
                font-weight: bold;
            }

            .badge {
                display: inline-block;
                padding: 2px 6px;
                font-size: 10px;
                font-weight: bold;
                color: white;
                background-color: #34495e;
                border-radius: 4px;
                margin-right: 5px;
            }

            .status-badge-done {
                background-color: #2ecc71;
                color: white;
                padding: 2px 6px;
                font-size: 10px;
                font-weight: bold;
                border-radius: 4px;
            }

            .status-badge-yet {
                background-color: #e74c3c;
                color: white;
                padding: 2px 6px;
                font-size: 10px;
                font-weight: bold;
                border-radius: 4px;
            }

            li button {
                background-color: #2ecc71;
                color: white;
                border: none;
                padding: 4px 8px;
                font-size: 11px;
                width: auto;
                border-radius: 4px;
                white-space: nowrap;
            }
            li button:hover { background-color: #27ae60; }

            .simple-calendar {
                width: 100%;
                border-collapse: collapse;
                margin-top: 10px;
            }

            .simple-calendar th, .simple-calendar td {
                border: 1px solid #ddd;
                text-align: center;
                padding: 8px;
                font-size: 13px;
            }

            .simple-calendar th {
                background-color: #f2f2f2;
                font-weight: bold;
            }

            .delete-btn {
                background-color: #e74c3c;
                color: white;
                border: none;
                padding: 3px 6px;
                font-size: 10px;
                border-radius: 4px;
                cursor: pointer;
                margin-left: 5px;
                font-weight: normal;
                width: auto;
            }
            .delete-btn:hover { background-color: #c0392b; }

            /* 📱 スマホ用の配置設定（画面幅が768px以下のとき） */
            @media (max-width: 768px) {
                body {
                    margin: 10px auto;
                    padding: 0 10px;
                }
                .header-area {
                    flex-direction: column;
                    align-items: flex-start;
                    gap: 10px;
                }
                .main-container {
                    flex-direction: column; /* 左右並びを縦並びに変更！ */
                }
                input[type="date"] { width: 100%; margin-bottom: 8px; }
                select { width: 100%; margin-bottom: 8px; }
                .simple-calendar th, .simple-calendar td {
                    padding: 5px;
                    font-size: 11px; /* カレンダーがはみ出さないように文字を少し小さく */
                }
            }
        </style>
    </head>
    <body>
        <div class="header-area">
            <h1>夏休み課題管理アプリ</h1>
            <div class="user-info">
                ログイン中: <strong>{{ username }}</strong> さん
                <a href="/logout" class="logout-btn">ログアウト</a>
            </div>
        </div>
        
        <div class="main-container">
            <div class="left-column">
                <div class="input-area">
                    <h2>新しい課題を追加する</h2>
                    <form action="/add" method
